<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dinner Decider</title>
    <style>

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            position: relative;
            overflow: hidden;
            isolation: isolate;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);

            width: 100%;

        }
        .container > * {
            position: relative;
            z-index: 1;
        }
        .secret-sprite-btn {
            all: unset;
            position: absolute;
            right: 8px;
            bottom: 4px;
            width: 120px;
            height: 120px;
            display: block;
            background: url('sanji-sprite.png') no-repeat center / contain;
            padding: 0;
            margin: 0;
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
            cursor: pointer;
            z-index: 25;
            outline: none !important;
            transition: filter 0.18s ease, transform 0.18s ease !important;
            -webkit-tap-highlight-color: transparent;
            appearance: none;
            -webkit-appearance: none;
            filter: none;
        }
        .secret-sprite-btn:hover,
        .secret-sprite-btn:focus,
        .secret-sprite-btn:active,
        .secret-sprite-btn:focus-visible {
            transform: scale(1.03) !important;
            box-shadow: none !important;
            outline: none !important;
            border: none !important;
            border-radius: 0 !important;
            background: url('sanji-sprite.png') no-repeat center / contain;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 8px rgba(118, 75, 162, 0.9));

        .container.secret-open .secret-sprite-btn {

<body>
    <div class="container">
        <div class="status-container">
            <div id="fileStatus" class="file-status loading">Loading spreadsheet...</div>
        </div>
        <div class="buttons-container">
            <button id="pickBtn" onclick="pickItems()" disabled>Make Dinner</button>
            <button onclick="refreshData()" style="background: linear-gradient(45deg, #4CAF50, #388E3C);">🔄 Refresh</button>
        </div>
        <div id="results" class="results"></div>
        <div id="itemList" class="item-list"></div>
        <div id="secretView" class="secret-view"></div>
        <button id="secretSpriteBtn" class="secret-sprite-btn" onclick="showSecretView()" aria-label="Open secret menu" title="Secret menu"></button>
    </div>

    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        let spreadsheetData = [];
        let currentMeal = null;
        let eggQuantity = 2;
        let bomboclatActive = false;
        let bomboclatTimeoutId = null;
        let bomboclatCanTrigger = true;
        let sauceMetadataMap = new Map();
        let pendingBoughtAdjustments = {};
        
        // Google Apps Script web app endpoint
        const API_URL = 'https://script.google.com/macros/s/AKfycbx_ljmCd4ipExfblatWEnG7LGUGxNIytiWLOxb7QwDf5vELmnDgPAImoqLkjVk2_LuNOw/exec';
        // Read-only metadata source that includes Opened/UseByDate columns
        const SAUCE_META_URL = 'https://opensheet.elk.sh/12KGA-cvI-pvEpkJZlyH17pBq99Ocb1Q-v0Vx9jBim4I/Sheet1';

        // Load data on page load
        window.addEventListener('load', loadSpreadsheet);

        async function fetchApiJson(url, options = {}) {
            const response = await fetch(url, options);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const text = await response.text();
            try {
                return text ? JSON.parse(text) : {};
            } catch (error) {
                console.error('Invalid JSON response:', text);
                throw new Error('API did not return valid JSON');
            }
        }

        function getStockValue(row) {
            const rawStock = row?.Stock ?? row?.stock ?? row?.Exclusions ?? row?.exclusions ?? '';

            if (rawStock === '' || rawStock === null || rawStock === undefined) {
                return 1;
            }

            const parsedStock = Number(rawStock);
            return Number.isFinite(parsedStock) ? Math.max(0, parsedStock) : 1;
        }

        function makeItemKey(item, category) {
            const normalizedItem = String(item ?? '').toLowerCase().trim();
            const normalizedCategory = String(category ?? '').toLowerCase().trim();
            if (!normalizedItem || !normalizedCategory) {
                return '';
            }
            return `${normalizedCategory}::${normalizedItem}`;
        }

        function getSauceOpenedValue(row) {
            return row?.Opened ?? row?.opened ?? row?.E ?? '';
        }

        function getSauceExpiryValue(row) {
            return row?.UseByDate ?? row?.['Use By Date'] ?? row?.Expiry ?? row?.expiry ?? row?.['Expiry Date'] ?? row?.['expiry date'] ?? row?.H ?? '';
        }

        function getSauceOpenDateValue(row) {
            return row?.['Open date'] ?? row?.['Open Date'] ?? row?.openDate ?? row?.F ?? '';
        }

        function getSauceShelfLifeValue(row) {
            return row?.ShelfLifeDays ?? row?.['Shelf Life Days'] ?? row?.G ?? '';
        }

        function getPackSizeValue(row) {
            return row?.PackSize ?? row?.['Pack Size'] ?? row?.packSize ?? row?.packsize ?? row?.I ?? '';
        }

        function isOpenedValue(value) {
            const normalized = String(value ?? '').toLowerCase().trim();
            return ['true', 'yes', 'y', '1', 'opened', 'open'].includes(normalized);
        }

        function parseDateValue(value) {
            if (value === null || value === undefined || String(value).trim() === '') {
                return null;
            }

            if (typeof value === 'number' && Number.isFinite(value)) {
                // Support sheet/excel serial dates.
                const serialDate = new Date(Math.round((value - 25569) * 86400 * 1000));
                return Number.isNaN(serialDate.getTime()) ? null : serialDate;
            }

            const textValue = String(value).trim();
            const numericValue = Number(textValue);
            if (!Number.isNaN(numericValue) && Number.isFinite(numericValue) && textValue !== '') {
                const serialDate = new Date(Math.round((numericValue - 25569) * 86400 * 1000));
                if (!Number.isNaN(serialDate.getTime())) {
                    return serialDate;
                }
            }

            // Handle dd/mm/yyyy and dd-mm-yyyy explicitly.
            const dmyMatch = textValue.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
            if (dmyMatch) {
                const day = Number(dmyMatch[1]);
                const month = Number(dmyMatch[2]);
                const rawYear = Number(dmyMatch[3]);
                const year = rawYear < 100 ? 2000 + rawYear : rawYear;
                const parsedDmy = new Date(year, month - 1, day);
                if (!Number.isNaN(parsedDmy.getTime())) {
                    return parsedDmy;
                }
            }

            const parsed = new Date(textValue);
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function getDaysUntil(date) {
            const today = new Date();
            const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const expiryMidnight = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            return Math.ceil((expiryMidnight - todayMidnight) / (1000 * 60 * 60 * 24));
        }

        function formatDate(date) {
            return date.toLocaleDateString('en-AU', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        function computeUseByFromOpenDate(openDateValue, shelfLifeValue) {
            const openDate = parseDateValue(openDateValue);
            const shelfLifeDays = Number(shelfLifeValue);

            if (!openDate || !Number.isFinite(shelfLifeDays)) {
                return null;
            }

            const computed = new Date(openDate);
            computed.setDate(computed.getDate() + shelfLifeDays);
            return computed;
        }

        function getItemExpiryDate(row) {
            const directExpiry = parseDateValue(row?.expiry ?? getSauceExpiryValue(row));
            const opened = isOpenedValue(row?.opened ?? getSauceOpenedValue(row));
            const fallbackExpiry = opened
                ? computeUseByFromOpenDate(row?.openDate ?? getSauceOpenDateValue(row), row?.shelfLifeDays ?? getSauceShelfLifeValue(row))
                : null;

            return directExpiry || fallbackExpiry;
        }

        function buildEnabledCategories() {
            const categories = {};

            spreadsheetData.forEach(row => {
                const category = row['Category'];
                const item = row['Food'];
                const enabled = String(row['Enabled']).toUpperCase().trim();
                const stock = getStockValue(row);

                if (category && item && (enabled === 'TRUE' || enabled === 'true')) {
                    if (!categories[category]) {
                        categories[category] = [];
                    }

                    const meta = sauceMetadataMap.get(makeItemKey(item, category)) || {};
                    const selection = {
                        item,
                        id: row['id'] || '',
                        rowIndex: row['rowIndex'],
                        category,
                        enabled: true,
                        stock,
                        opened: meta.opened ?? getSauceOpenedValue(row),
                        openDate: meta.openDate ?? getSauceOpenDateValue(row),
                        shelfLifeDays: meta.shelfLifeDays ?? getSauceShelfLifeValue(row),
                        expiry: meta.expiry ?? getSauceExpiryValue(row),
                        exclusions: row['Exclusions'] || ''
                    };

                    selection.expiryDate = getItemExpiryDate(selection);
                    categories[category].push(selection);
                }
            });

            return categories;
        }

        function getPurchaseStep(row) {
            const explicitCandidates = [
                getPackSizeValue(row),
                row?.BuyStep,
                row?.['Buy Step'],
                row?.buyStep,
                row?.PurchaseStep,
                row?.['Purchase Step'],
                row?.purchaseStep,
                row?.RestockStep,
                row?.['Restock Step'],
                row?.restockStep
            ];

            for (const candidate of explicitCandidates) {
                const parsed = Number(candidate);
                if (Number.isFinite(parsed) && parsed > 0) {
                    return Math.round(parsed);
                }
            }

            const itemName = String(row?.Food ?? row?.item ?? '').toLowerCase().trim();
            if (itemName.includes('egg')) {
                return 6;
            }

            return 1;
        }

        function getLowStockThreshold(row) {
            const explicitCandidates = [
                row?.LowStockAt,
                row?.['Low Stock At'],
                row?.lowStockAt,
                row?.LowStock,
                row?.['Low Stock'],
                row?.lowStock,
                row?.ReorderAt,
                row?.['Reorder At'],
                row?.reorderAt
            ];

            for (const candidate of explicitCandidates) {
                const parsed = Number(candidate);
                if (Number.isFinite(parsed) && parsed >= 0) {
                    return Math.round(parsed);
                }
            }

            const isSauce = String(row?.Category ?? '').toLowerCase().trim() === 'sauce';
            if (!isSauce) {
                return 5;
            }

            const packSize = Number(getPackSizeValue(row));
            if (Number.isFinite(packSize) && packSize > 1) {
                return Math.max(1, Math.ceil(packSize / 2));
            }

            return 1;
        }

        function getShoppingListItems() {
            return spreadsheetData
                .filter(row => {
                    const item = String(row?.Food ?? '').trim();
                    const category = String(row?.Category ?? '').trim();
                    const enabled = String(row?.Enabled ?? '').toUpperCase().trim() === 'TRUE';
                    return item !== '' && category !== '' && enabled;
                })
                .map(row => {
                    const stock = getStockValue(row);
                    const lowThreshold = getLowStockThreshold(row);
                    const packSize = Number(getPackSizeValue(row));
                    const expiryDate = getItemExpiryDate(row);
                    const daysUntilExpiry = expiryDate ? getDaysUntil(expiryDate) : null;
                    const isSauce = String(row?.Category ?? '').toLowerCase().trim() === 'sauce';
                    const isOutOfStock = stock <= 0;
                    const isLowStock = !isOutOfStock && stock <= lowThreshold;
                    const isExpiringSoon = Number.isFinite(daysUntilExpiry) && daysUntilExpiry >= 0 && daysUntilExpiry <= 7;
                    const shouldInclude = isSauce
                        ? (isOutOfStock || isExpiringSoon)
                        : (isOutOfStock || isLowStock || isExpiringSoon);

                    if (!shouldInclude) {
                        return null;
                    }

                    let status = 'low';
                    if (isOutOfStock) {
                        status = 'out';
                    } else if (isExpiringSoon) {
                        status = 'expiring';
                    }

                    return {
                        item: row.Food,
                        category: row.Category,
                        stock,
                        lowThreshold,
                        packSize: Number.isFinite(packSize) && packSize > 0 ? Math.round(packSize) : null,
                        status,
                        expiryDate,
                        daysUntilExpiry
                    };
                })
                .filter(Boolean)
                .sort((a, b) => {
                    const rank = status => ({ out: 0, expiring: 1, low: 2 }[status] ?? 3);
                    const statusOrder = rank(a.status) - rank(b.status);
                    if (statusOrder !== 0) return statusOrder;

                    if (a.status === 'expiring' && b.status === 'expiring') {
                        return a.expiryDate - b.expiryDate;
                    }

                    const stockOrder = a.stock - b.stock;
                    if (stockOrder !== 0) return stockOrder;

                    const categoryOrder = String(a.category).localeCompare(String(b.category));
                    return categoryOrder !== 0 ? categoryOrder : String(a.item).localeCompare(String(b.item));
                });
        }

        function finishMealSelection(results) {
            bomboclatActive = false;
            if (bomboclatTimeoutId) {
                clearTimeout(bomboclatTimeoutId);
                bomboclatTimeoutId = null;
            }
            bomboclatCanTrigger = true;
            eggQuantity = 2;
            currentMeal = results;
            hideSecretView();
            displayResults(results);
        }

        function syncCurrentMealWithSpreadsheet() {
            if (!currentMeal) {
                return;
            }

            Object.keys(currentMeal).forEach(category => {
                const selection = currentMeal[category];
                const row = spreadsheetData.find(item => String(item.rowIndex) === String(selection?.rowIndex));
                if (!row) {
                    return;
                }

                const meta = sauceMetadataMap.get(makeItemKey(row?.Food, row?.Category)) || {};
                const updatedSelection = {
                    ...selection,
                    item: row.Food,
                    id: row.id || selection.id || '',
                    rowIndex: row.rowIndex,
                    category: row.Category || selection.category || category,
                    enabled: String(row['Enabled']).toUpperCase().trim() === 'TRUE',
                    stock: getStockValue(row),
                    opened: meta.opened ?? getSauceOpenedValue(row),
                    openDate: meta.openDate ?? getSauceOpenDateValue(row),
                    shelfLifeDays: meta.shelfLifeDays ?? getSauceShelfLifeValue(row),
                    expiry: meta.expiry ?? getSauceExpiryValue(row),
                    exclusions: row.Exclusions || ''
                };

                updatedSelection.expiryDate = getItemExpiryDate(updatedSelection);
                currentMeal[category] = updatedSelection;
            });
        }

        function refreshVisibleContent() {
            const resultsDiv = document.getElementById('results');
            const itemListDiv = document.getElementById('itemList');
            const secretView = document.getElementById('secretView');

            if (resultsDiv?.classList.contains('show') && currentMeal) {
                syncCurrentMealWithSpreadsheet();
                displayResults(currentMeal);
            }

            if (itemListDiv?.classList.contains('show')) {
                showItemList();
            }

            if (secretView?.classList.contains('show')) {
                const currentTitle = secretView.querySelector('h2')?.textContent || '';
                if (currentTitle.includes('I Bought')) {
                    showBoughtItems();
                } else if (currentTitle.includes('Shopping List')) {
                    showShoppingList();
                } else if (currentTitle.includes('Expiring Items')) {
                    showExpiringItems();
                } else if (currentTitle.includes('Secret Menu')) {
                    showSecretView();
                }
            }
        }

        function renderSauceMeta(selectedItem) {
            const opened = isOpenedValue(selectedItem.opened);
            const expiryDate = parseDateValue(selectedItem.expiry) || (opened ? computeUseByFromOpenDate(selectedItem.openDate, selectedItem.shelfLifeDays) : null);
            let openedClass = opened ? 'opened-yes' : 'opened-no';
            let openedText = opened ? 'Opened' : 'Unopened';
            let expiryDisplayValue = 'Unknown';
            let expiryClass = 'expiry-normal';

            if (expiryDate) {
                const daysUntilExpiry = getDaysUntil(expiryDate);
                expiryDisplayValue = formatDate(expiryDate);

                if (daysUntilExpiry < 0) {
                    openedClass = 'opened-expired';
                    openedText = 'Expired';
                    expiryClass = 'expiry-danger';
                } else if (daysUntilExpiry < 7) {
                    expiryClass = 'expiry-danger';
                } else if (daysUntilExpiry < 14) {
                    expiryClass = 'expiry-warning';
                }
            }

            const statusMarkup = !opened || openedText === 'Expired'
                ? `<span class="sauce-open"><span class="sauce-label">Status:</span> <span class="${openedClass}">${openedText}</span></span>`
                : '';
            const expiryMarkup = opened
                ? `<span class="sauce-expiry"><span class="sauce-label">Expiry:</span> <span class="expiry-value ${expiryClass}">${expiryDisplayValue}</span></span>`
                : '';

            return `<div class="sauce-meta">${statusMarkup}${expiryMarkup}</div>`;
        }

        function loadSpreadsheet() {
            const statusDiv = document.getElementById('fileStatus');
            statusDiv.textContent = 'Loading spreadsheet...';
            statusDiv.className = 'file-status loading';
            
            fetchApiJson(API_URL)
                .then(async data => {
                    const rows = Array.isArray(data) ? data : data.items || data.data || [];
                    // Ignore blank/invalid rows from API responses to avoid accidental writes.
                    spreadsheetData = rows.filter(row => {
                        const item = String(row?.Food ?? '').trim();
                        const category = String(row?.Category ?? '').trim();
                        return item !== '' && category !== '';
                    });

                    // Merge sauce metadata from a read-only endpoint with full columns.
                    sauceMetadataMap = new Map();
                    try {
                        const metaRows = await fetchApiJson(SAUCE_META_URL);
                        if (Array.isArray(metaRows)) {
                            metaRows.forEach(metaRow => {
                                const key = makeItemKey(metaRow?.Food, metaRow?.Category);
                                if (!key) return;
                                sauceMetadataMap.set(key, {
                                    opened: getSauceOpenedValue(metaRow),
                                    expiry: getSauceExpiryValue(metaRow),
                                    openDate: getSauceOpenDateValue(metaRow),
                                    shelfLifeDays: getSauceShelfLifeValue(metaRow),
                                    packSize: getPackSizeValue(metaRow)
                                });
                            });

                            spreadsheetData = spreadsheetData.map(row => {
                                const meta = sauceMetadataMap.get(makeItemKey(row?.Food, row?.Category)) || {};
                                return {
                                    ...row,
                                    Opened: meta.opened ?? row.Opened,
                                    UseByDate: meta.expiry ?? row.UseByDate,
                                    ['Open date']: meta.openDate ?? row['Open date'],
                                    ShelfLifeDays: meta.shelfLifeDays ?? row.ShelfLifeDays,
                                    PackSize: meta.packSize ?? getPackSizeValue(row)
                                };
                            });
                        }
                    } catch (metaError) {
                        console.warn('Could not load sauce metadata endpoint:', metaError);
                    }
                    
                    // Count enabled items
                    const enabledCount = spreadsheetData.filter(row => 
                        String(row['Enabled']).toUpperCase().trim() === 'TRUE'
                    ).length;
                    const totalCount = spreadsheetData.length;
                    
                    console.log('Loaded data:', spreadsheetData);
                    console.log('First row:', spreadsheetData[0]);
                    statusDiv.textContent = `✓ Spreadsheet loaded (${enabledCount} items enabled of ${totalCount})`;
                    statusDiv.className = 'file-status success';
                    document.getElementById('pickBtn').disabled = false;
                    statusDiv.onclick = showItemList;
                    refreshVisibleContent();
                })
                .catch(error => {
                    console.error('Error fetching spreadsheet:', error);
                    statusDiv.textContent = '✗ Error loading spreadsheet. Please try again.';
                    statusDiv.className = 'file-status';
                    statusDiv.style.backgroundColor = '#f8d7da';
                    statusDiv.style.color = '#721c24';
                    statusDiv.style.display = 'block';

                    const secretView = document.getElementById('secretView');
                    if (secretView && secretView.classList.contains('show')) {
                        const currentTitle = secretView.querySelector('h2')?.textContent || '';
                        if (currentTitle.includes('Secret Menu')) {
                            showSecretView();
                        }
                    }
                });
        }

        async function toggleSauceOpened(categoryKey) {
            if (!currentMeal || !currentMeal[categoryKey]) {
                return;
            }

            const selection = currentMeal[categoryKey];
            if (isOpenedValue(selection.opened)) {
                return;
            }

            const nextOpened = true;
            const todayText = new Date().toLocaleDateString('en-AU');

            const previousOpened = selection.opened;
            const previousOpenDate = selection.openDate;
            selection.opened = nextOpened;
            if (!selection.openDate) {
                selection.openDate = todayText;
            }
            if (!selection.expiry) {
                const computedUseBy = computeUseByFromOpenDate(selection.openDate, selection.shelfLifeDays);
                if (computedUseBy) {
                    selection.expiry = formatDate(computedUseBy);
                }
            }

            try {
                await sendUpdateToAppsScript({
                    id: selection.id || '',
                    rowIndex: selection.rowIndex || '',
                    item: selection.item,
                    category: selection.category || categoryKey,
                    enabled: true,
                    stock: selection.stock,
                    opened: 'TRUE',
                    openDate: selection.openDate || todayText,
                    shelfLifeDays: selection.shelfLifeDays || '',
                    useByDate: '',
                    exclusions: selection.exclusions || ''
                });

                const row = spreadsheetData.find(item => String(item.rowIndex) === String(selection.rowIndex));
                if (row) {
                    row.Opened = 'TRUE';
                    row['Open date'] = selection.openDate || todayText;
                }

                const metaKey = makeItemKey(selection.item, selection.category || categoryKey);
                if (metaKey) {
                    sauceMetadataMap.set(metaKey, {
                        ...(sauceMetadataMap.get(metaKey) || {}),
                        opened: 'TRUE',
                        openDate: selection.openDate || todayText,
                        expiry: selection.expiry || selection.useByDate || '',
                        shelfLifeDays: selection.shelfLifeDays || ''
                    });
                }

                displayResults(currentMeal);
            } catch (error) {
                selection.opened = previousOpened;
                selection.openDate = previousOpenDate;
                console.error('Error updating sauce opened state:', error);
                alert(`Could not update ${selection.item}: ${error.message}`);
            }
        }

        async function pickItems() {
            if (spreadsheetData.length === 0) {
                alert('Please wait for spreadsheet to load');
                return;
            }

            const categories = buildEnabledCategories();

            if (Object.keys(categories).length === 0) {
                alert('No enabled items are currently in stock.');
                return;
            }

            const results = {};
            for (const category in categories) {
                const items = categories[category];
                results[category] = items[Math.floor(Math.random() * items.length)];
            }

            finishMealSelection(results);
        }

        async function pickExpiringItems() {
            if (spreadsheetData.length === 0) {
                alert('Please wait for spreadsheet to load');
                return;
            }

            const categories = buildEnabledCategories();

            if (Object.keys(categories).length === 0) {
                alert('No enabled items are currently in stock.');
                return;
            }

            const results = {};
            for (const category in categories) {
                const items = categories[category];
                const sortedByExpiry = items
                    .filter(item => item.expiryDate instanceof Date && !Number.isNaN(item.expiryDate.getTime()))
                    .sort((a, b) => {
                        const aDays = getDaysUntil(a.expiryDate);
                        const bDays = getDaysUntil(b.expiryDate);
                        const aExpired = aDays < 0 ? 1 : 0;
                        const bExpired = bDays < 0 ? 1 : 0;

                        if (aExpired !== bExpired) {
                            return aExpired - bExpired;
                        }

                        const dateDiff = a.expiryDate - b.expiryDate;
                        return dateDiff !== 0 ? dateDiff : String(a.item).localeCompare(String(b.item));
                    });

                results[category] = sortedByExpiry[0] || items[Math.floor(Math.random() * items.length)];
            }

            finishMealSelection(results);
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="results-grid">';
            
            for (const category in results) {
                const selectedItem = results[category];
                const icon = getCategoryIcon(category, selectedItem.item);
                const isEggs = category === 'Protein' && selectedItem.item.toLowerCase().trim().includes('egg');
                const isSauce = String(category).toLowerCase().trim() === 'sauce';
                const sauceHasStock = Number(selectedItem.stock) > 0;
                resultsDiv.innerHTML += `
                    <div class="result-item">
                        <div style="font-size: 2em; margin-bottom: 8px;">${icon}</div>
                        ${selectedItem.item}
                        ${category === 'Sauce'
                            ? `${selectedItem.stock > 0
                                ? (!isOpenedValue(selectedItem.opened)
                                    ? `<span class="stock-note opened-yes">In Stock!</span>`
                                    : '')
                                : `<span class="stock-note out-of-stock">Out of Stock</span>`}`
                            : `<span class="stock-note ${selectedItem.stock > 0 ? '' : 'out-of-stock'}">${selectedItem.stock > 0 ? `In stock: ${selectedItem.stock}` : 'Out of Stock'}</span>`}
                        ${isSauce && sauceHasStock ? renderSauceMeta(selectedItem) : ''}
                        ${isSauce && sauceHasStock && !isOpenedValue(selectedItem.opened) ? `
                            <div class="sauce-open-controls">
                                <button class="open-toggle-btn" onclick="toggleSauceOpened('${category}')">
                                    Open Sauce
                                </button>
                            </div>
                        ` : ''}
                        ${isEggs ? (bomboclatActive ? `
                            <div class="bomboclat-note">Bomboclat!</div>
                        ` : `
                            <div class="egg-quantity-controls">
                                <button class="qty-btn" onclick="changeEggQuantity(-1)">−</button>
                                <span id="eggQtyDisplay" class="egg-qty-display">${eggQuantity}</span>
                                <button class="qty-btn" onclick="changeEggQuantity(1)">+</button>
                            </div>
                        `) : ''}
                    </div>
                `;
            }
            
            resultsDiv.innerHTML += `</div>
                <div class="result-actions">
                    <button id="confirmMealBtn" class="save-btn confirm-btn" onclick="confirmMeal()">Confirm Meal</button>
                </div>`;
            resultsDiv.classList.add('show');
        }

        function changeEggQuantity(delta) {
            if (!currentMeal || !currentMeal.Protein || !currentMeal.Protein.item.toLowerCase().trim().includes('egg') || bomboclatActive) {
                return;
            }

            const maxQty = Math.max(1, currentMeal.Protein.stock);
            const nextQuantity = Math.min(maxQty, Math.max(1, eggQuantity + delta));

            const isTriggerTransition = eggQuantity === 5 && nextQuantity === 6 && bomboclatCanTrigger;

            if (isTriggerTransition) {
                bomboclatActive = true;
                bomboclatCanTrigger = false;
                eggQuantity = 6;
                displayResults(currentMeal);

                if (bomboclatTimeoutId) {
                    clearTimeout(bomboclatTimeoutId);
                }

                bomboclatTimeoutId = setTimeout(() => {
                    bomboclatActive = false;
                    bomboclatTimeoutId = null;
                    if (currentMeal) {
                        displayResults(currentMeal);
                    }
                }, 625);
                return;
            }

            eggQuantity = nextQuantity;
            if (eggQuantity <= 5) {
                bomboclatCanTrigger = true;
            }
            displayResults(currentMeal);
        }

        function getCategoryIcon(category, itemName = '') {
            const normalizedItem = itemName.toLowerCase().trim();

            if (category === 'Protein') {
                if (normalizedItem.includes('egg')) return '🥚';
                if (normalizedItem.includes('tuna')) return '🐟';
                if (normalizedItem.includes('chicken')) return '🐔';
            }

            const icons = {
                'Grain': '🌾',
                'Protein': '🥩',
                'Sauce': '🍯',
                'Vegetable': '🥕',
                'Fruit': '🍎'
            };
            return icons[category] || '🍽️';
        }

        function hideItemList() {
            const itemListDiv = document.getElementById('itemList');
            itemListDiv.classList.remove('show');
            document.querySelector('.buttons-container').style.display = 'flex';
        }

        function getExpiryClass(daysUntilExpiry) {
            if (daysUntilExpiry < 0) return 'expiry-danger';
            if (daysUntilExpiry <= 7) return 'expiry-danger';
            if (daysUntilExpiry <= 14) return 'expiry-warning';
            return 'expiry-normal';
        }

        function showExpiringItems() {
            const secretView = document.getElementById('secretView');
            const resultsDiv = document.getElementById('results');
            document.querySelector('.buttons-container').style.display = 'none';
            resultsDiv.classList.remove('show');

            const expiringItems = spreadsheetData
                .map(row => {
                    const item = String(row?.Food || '').trim();
                    const category = String(row?.Category || '').trim();
                    const directExpiry = parseDateValue(getSauceExpiryValue(row));
                    const fallbackExpiry = isOpenedValue(getSauceOpenedValue(row))
                        ? computeUseByFromOpenDate(getSauceOpenDateValue(row), getSauceShelfLifeValue(row))
                        : null;
                    const expiryDate = directExpiry || fallbackExpiry;

                    if (!item || !category || !expiryDate) {
                        return null;
                    }

                    return {
                        item,
                        category,
                        expiryDate,
                        daysUntilExpiry: getDaysUntil(expiryDate)
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.expiryDate - b.expiryDate);

            let html = '<h2>⏳ Expiring Items</h2>';

            if (expiringItems.length === 0) {
                html += '<p>No items with expiry dates found.</p>';
            } else {
                expiringItems.forEach(entry => {
                    const expiryClass = getExpiryClass(entry.daysUntilExpiry);
                    html += `
                        <div class="expiry-list-item">
                            <div>
                                <div class="expiry-item-name">${entry.item}</div>
                                <div class="stock-note">${entry.category}</div>
                            </div>
                            <div class="expiry-item-date ${expiryClass}">${formatDate(entry.expiryDate)}</div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="secret-return-wrap">
                    <button class="secret-return-btn" onclick="showSecretView()">↩ Return</button>
                </div>
            `;
            secretView.innerHTML = html;
            secretView.classList.add('show');
        }

        function showShoppingList() {
            if (spreadsheetData.length === 0) {
                alert('Please wait for spreadsheet to load');
                return;
            }

            const secretView = document.getElementById('secretView');
            const resultsDiv = document.getElementById('results');
            const itemListDiv = document.getElementById('itemList');
            const container = document.querySelector('.container');
            document.querySelector('.buttons-container').style.display = 'none';
            resultsDiv.classList.remove('show');
            itemListDiv.classList.remove('show');
            container.classList.add('secret-open');

            const shoppingItems = getShoppingListItems();
            let html = '<h2>🛍️ Shopping List</h2>';

            if (shoppingItems.length === 0) {
                html += '<p>Nothing is low or out of stock right now.</p>';
            } else {
                shoppingItems.forEach(entry => {
                    let statusLabel = 'Low Stock';
                    let statusClass = 'low';
                    let subtext = `${entry.category} • ${entry.stock} left`;

                    if (entry.status === 'out') {
                        statusLabel = 'Out of Stock';
                        statusClass = 'out';
                    } else if (entry.status === 'expiring') {
                        statusLabel = 'Expires soon';
                        statusClass = 'expiring';
                        const dayLabel = entry.daysUntilExpiry === 1 ? 'day' : 'days';
                        subtext = `${entry.category} • <span class="shopping-expiry-text">Expires: ${entry.daysUntilExpiry} ${dayLabel}</span>`;
                    }

                    html += `
                        <div class="shopping-list-item">
                            <div class="shopping-list-meta">
                                <div class="shopping-item-name">${entry.item}</div>
                                <div class="stock-note">${subtext}</div>
                            </div>
                            <div class="shopping-list-actions">
                                <span class="shopping-status ${statusClass}">${statusLabel}</span>
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="secret-return-wrap">
                    <button class="secret-return-btn" onclick="showSecretView()">↩ Return</button>
                </div>
            `;

            secretView.innerHTML = html;
            secretView.classList.add('show');
        }

        function showBoughtItems() {
            if (spreadsheetData.length === 0) {
                alert('Please wait for spreadsheet to load');
                return;
            }

            const secretView = document.getElementById('secretView');
            const resultsDiv = document.getElementById('results');
            const itemListDiv = document.getElementById('itemList');
            const container = document.querySelector('.container');
            document.querySelector('.buttons-container').style.display = 'none';
            resultsDiv.classList.remove('show');
            itemListDiv.classList.remove('show');
            container.classList.add('secret-open');

            const categories = {};
            spreadsheetData
                .filter(row => String(row?.Food ?? '').trim() !== '' && String(row?.Category ?? '').trim() !== '')
                .sort((a, b) => {
                    const categoryDiff = String(a.Category).localeCompare(String(b.Category));
                    return categoryDiff !== 0 ? categoryDiff : String(a.Food).localeCompare(String(b.Food));
                })
                .forEach(row => {
                    const category = row.Category;
                    if (!categories[category]) {
                        categories[category] = [];
                    }
                    categories[category].push(row);
                });

            let html = `
                <h2>🛒 I Bought</h2>
            `;

            Object.keys(categories).forEach(category => {
                html += `<div class="bought-group"><h3>${category}</h3>`;
                categories[category].forEach(row => {
                    const rowKey = String(row.rowIndex || '');
                    const currentStock = getStockValue(row);
                    const step = getPurchaseStep(row);
                    const pendingAmount = pendingBoughtAdjustments[rowKey] || 0;
                    const nextStock = currentStock + pendingAmount;

                    html += `
                        <div class="bought-item-row">
                            <div class="bought-item-meta">
                                <div class="bought-item-name">${row.Food}</div>
                                <div class="bought-stock-summary">
                                    <span class="bought-pill">Now ${currentStock}</span>
                                    <span class="bought-pill ${pendingAmount > 0 ? 'pending' : ''}">After ${nextStock}</span>
                                </div>
                            </div>
                            <div class="bought-controls">
                                <button class="qty-btn step-btn step-minus" onclick="changeBoughtAmount('${rowKey}', -${step})">−${step}</button>
                                <span class="bought-add-display">+${pendingAmount}</span>
                                <button class="qty-btn step-btn step-plus" onclick="changeBoughtAmount('${rowKey}', ${step})">+${step}</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            });

            html += `
                <div class="secret-return-wrap">
                    <button id="saveBoughtBtn" class="save-btn" onclick="saveBoughtItems()">Save Stock</button>
                    <button class="secret-return-btn" onclick="showSecretView()">↩ Return</button>
                </div>
            `;

            secretView.innerHTML = html;
            secretView.classList.add('show');
        }

        function changeBoughtAmount(rowIndex, delta) {
            const key = String(rowIndex || '');
            if (!key) {
                return;
            }

            const secretView = document.getElementById('secretView');
            const previousScroll = secretView ? secretView.scrollTop : 0;
            const currentAmount = pendingBoughtAdjustments[key] || 0;
            const nextAmount = Math.max(0, currentAmount + delta);

            if (nextAmount === 0) {
                delete pendingBoughtAdjustments[key];
            } else {
                pendingBoughtAdjustments[key] = nextAmount;
            }

            showBoughtItems();
            requestAnimationFrame(() => {
                const updatedSecretView = document.getElementById('secretView');
                if (updatedSecretView) {
                    updatedSecretView.scrollTop = previousScroll;
                }
            });
        }

        async function saveBoughtItems() {
            const updates = Object.entries(pendingBoughtAdjustments)
                .map(([rowIndex, addedStock]) => {
                    const row = spreadsheetData.find(item => String(item.rowIndex) === String(rowIndex));
                    if (!row || !Number.isFinite(Number(addedStock)) || Number(addedStock) <= 0) {
                        return null;
                    }

                    const currentStock = getStockValue(row);
                    return {
                        id: row.id || '',
                        rowIndex: row.rowIndex || '',
                        item: row.Food,
                        category: row.Category,
                        enabled: String(row['Enabled']).toUpperCase().trim() === 'TRUE',
                        stock: currentStock + Number(addedStock),
                        opened: getSauceOpenedValue(row),
                        openDate: getSauceOpenDateValue(row),
                        shelfLifeDays: getSauceShelfLifeValue(row),
                        useByDate: getSauceExpiryValue(row),
                        exclusions: row.Exclusions || ''
                    };
                })
                .filter(Boolean);

            if (updates.length === 0) {
                alert('Choose at least one item to add first.');
                return;
            }

            const saveBtn = document.getElementById('saveBoughtBtn');
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';
            }

            try {
                for (const update of updates) {
                    await sendUpdateToAppsScript(update);

                    const row = spreadsheetData.find(item => String(item.rowIndex) === String(update.rowIndex));
                    if (row) {
                        row.Stock = update.stock;
                        row.Exclusions = update.stock;
                    }
                }

                pendingBoughtAdjustments = {};
                showBoughtItems();
                loadSpreadsheet();
                alert('Stock added successfully!');
            } catch (error) {
                console.error('Error updating bought stock:', error);
                alert(`Error saving stock: ${error.message}`);

                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Stock';
                }
            }
        }

        async function confirmMeal() {
            if (!currentMeal) {
                alert('Please generate a meal first.');
                return;
            }

            const confirmBtn = document.getElementById('confirmMealBtn');
            if (confirmBtn) {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.6';
                confirmBtn.style.cursor = 'not-allowed';
                confirmBtn.textContent = 'Confirming...';
            }

            try {
                const updates = Object.values(currentMeal).map(selection => {
                    const row = spreadsheetData.find(item => String(item.rowIndex) === String(selection.rowIndex));

                    if (!row) {
                        throw new Error(`Could not find ${selection.item} in the spreadsheet data.`);
                    }

                    if (!row.rowIndex || Number.isNaN(Number(row.rowIndex))) {
                        throw new Error(`Invalid row index for ${selection.item}. Refresh and try again.`);
                    }

                    const currentStock = getStockValue(row);
                    const isSauce = String(selection.category).toLowerCase().trim() === 'sauce';
                    const decrementAmount = isSauce
                        ? 0
                        : (selection.category === 'Protein' && selection.item.toLowerCase().trim().includes('egg') ? eggQuantity : 1);

                    return {
                        id: row.id || '',
                        rowIndex: row.rowIndex || '',
                        item: row.Food,
                        category: row.Category,
                        enabled: String(row['Enabled']).toUpperCase().trim() === 'TRUE',
                        stock: isSauce ? currentStock : Math.max(0, currentStock - decrementAmount),
                        opened: getSauceOpenedValue(row),
                        openDate: getSauceOpenDateValue(row),
                        shelfLifeDays: getSauceShelfLifeValue(row),
                        useByDate: isSauce ? '' : getSauceExpiryValue(row),
                        exclusions: row.Exclusions || ''
                    };
                });

                for (const update of updates) {
                    await sendUpdateToAppsScript(update);

                    const row = spreadsheetData.find(item => String(item.rowIndex) === String(update.rowIndex));
                    if (row) {
                        row.Stock = update.stock;
                        row.Exclusions = update.stock;
                    }
                }

                Object.keys(currentMeal).forEach(category => {
                    const selection = currentMeal[category];
                    const updatedRow = spreadsheetData.find(item => String(item.rowIndex) === String(selection.rowIndex));
                    if (updatedRow) {
                        currentMeal[category].stock = getStockValue(updatedRow);
                    }
                });

                displayResults(currentMeal);
                alert('Meal confirmed! Stock has been reduced by 1 for the selected items.');
                loadSpreadsheet();

                if (confirmBtn) {
                    confirmBtn.textContent = 'Confirmed ✓';
                }
            } catch (error) {
                console.error('Error confirming meal:', error);
                alert(`Error confirming meal: ${error.message}`);

                if (confirmBtn) {
                    confirmBtn.disabled = false;
                    confirmBtn.style.opacity = '1';
                    confirmBtn.style.cursor = 'pointer';
                    confirmBtn.textContent = 'Confirm Meal';
                }
            }
        }

        async function sendUpdateToAppsScript(update) {
            const rowIndex = Number(update.rowIndex);
            if (!Number.isFinite(rowIndex) || rowIndex <= 0) {
                throw new Error(`Refusing to update invalid row index: ${update.rowIndex}`);
            }

            const item = String(update.item || '').trim();
            const category = String(update.category || '').trim();
            if (!item || !category) {
                throw new Error('Refusing to update blank item/category row');
            }

            const normalizedCategory = category.toLowerCase().trim();
            const stockValue = update.stock;
            const enabledValue = update.enabled ? 'TRUE' : 'FALSE';
            const openedValue = normalizedCategory === 'sauce'
                ? (isOpenedValue(update.opened) ? 'TRUE' : 'FALSE')
                : (isOpenedValue(getSauceOpenedValue(update)) ? 'TRUE' : 'FALSE');

            const payload = {
                action: 'update',
                rowIndex,
                row: {
                    Food: item,
                    Category: category,
                    Enabled: enabledValue,
                    Stock: stockValue,
                    Exclusions: stockValue,
                    Opened: openedValue,
                    'Open date': normalizedCategory === 'sauce' ? (update.openDate ?? '') : getSauceOpenDateValue(update),
                    ShelfLifeDays: normalizedCategory === 'sauce' ? (update.shelfLifeDays ?? '') : getSauceShelfLifeValue(update),
                    UseByDate: normalizedCategory === 'sauce' ? '' : getSauceExpiryValue(update)
                }
            };

            const result = await fetchApiJson(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            console.log('Apps Script update payload/result:', payload, result);

            if (result && result.success === false) {
                throw new Error(result.error || result.message || 'Update failed');
            }

            return result;
        }

        async function saveChanges() {
            const checkboxes = document.querySelectorAll('#itemList input[type="checkbox"]');
            const updates = [];

            checkboxes.forEach(cb => {
                const id = cb.getAttribute('data-id');
                const rowIndex = cb.getAttribute('data-row-index');
                const item = cb.getAttribute('data-item');
                const category = cb.getAttribute('data-category');
                const newEnabled = cb.checked;
                const row = spreadsheetData.find(r => (id ? r.id == id : rowIndex ? String(r.rowIndex) === String(rowIndex) : r.Food === item && r.Category === category));
                const currentEnabled = row ? String(row['Enabled']).toUpperCase().trim() === 'TRUE' : false;
                if (row && currentEnabled !== newEnabled) {
                    if (!row.rowIndex || Number.isNaN(Number(row.rowIndex))) {
                        console.warn('Skipping checkbox update without valid rowIndex:', row);
                        return;
                    }
                    updates.push({
                        id: row.id || '',
                        rowIndex: row.rowIndex || '',
                        item: row.Food,
                        category: row.Category,
                        enabled: newEnabled,
                        stock: getStockValue(row),
                        exclusions: row.Exclusions || ''
                    });
                }
            });

            if (updates.length === 0) {
                hideItemList();
                return;
            }

            console.log('Updates to send:', updates);

            // Send updates
            const saveBtn = document.querySelector('#itemList .save-btn');
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.style.opacity = '0.6';
                saveBtn.style.cursor = 'not-allowed';
                saveBtn.textContent = 'Saving...';
            }

            try {
                for (const update of updates) {
                    if (!update.rowIndex || Number.isNaN(Number(update.rowIndex))) {
                        console.warn('Skipping invalid save update:', update);
                        continue;
                    }
                    const result = await sendUpdateToAppsScript(update);
                    console.log('Update result:', result);
                }
            } catch (error) {
                console.error('Error updating items:', error);
                alert(`Error saving changes: ${error.message}`);
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.style.opacity = '1';
                    saveBtn.style.cursor = 'pointer';
                    saveBtn.textContent = 'Save Changes';
                }
                return;
            }

            alert('Changes saved successfully!');

            setTimeout(() => {
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.style.opacity = '1';
                    saveBtn.style.cursor = 'pointer';
                    saveBtn.textContent = 'Save Changes';
                }
            }, 2000);

            // Refresh data
            loadSpreadsheet();
            hideItemList();
        }
    </script>
